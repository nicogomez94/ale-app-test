services:
  - type: web
    name: pas-alert-api
    runtime: node
    plan: free
    buildCommand: cd server && npm ci && npx prisma generate && npm run build
    startCommand: cd server && npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: postgresql://basefree_user:5qKWDSyE5T9svRX1BwlRUabLM7IcU5L9@dpg-d6sqp1ia214c73c704qg-a/basefree?schema=pas_alert_nico
      - key: JWT_SECRET
        generateValue: true
      - key: MP_ACCESS_TOKEN
        value: REPLACE_WITH_MP_ACCESS_TOKEN
      - key: APP_URL
        fromService:
          type: web
          name: pas-alert-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: pas-alert-web
    runtime: static
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pas-alert-api
          envVarKey: RENDER_EXTERNAL_URL
